<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CargoBridge AI — Intelligent Logistics</title>
    <style>html, body { height: 100%; margin: 0; } #root { height: 100%; }</style>
    <!-- We serve the compiled React Vite app from our static folder -->
    <script type="module" crossorigin src="{{ url_for('static', filename='ui-assets/index-BKR6WswV.js') }}"></script>
    <link rel="stylesheet" crossorigin href="{{ url_for('static', filename='ui-assets/index-CUNctrXR.css') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='app_icon.png') }}">
  </head>

  <body style="background-color: #020617; color: white;">
    <div id="root"></div>

    <script>
      // Wire up the React buttons to Flask routes dynamically
      document.addEventListener('click', function(e) {
        let el = e.target.closest('button') || e.target.closest('a');
        if (el && el.textContent && el.textContent.includes('Get Started')) {
          e.preventDefault();
          window.location.href = "{{ url_for('login') }}";
        }
      });
    </script>
  </body>
</html>
